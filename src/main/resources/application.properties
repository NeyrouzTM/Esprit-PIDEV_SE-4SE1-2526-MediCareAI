spring.application.name=medicare-ai
server.port=8089
server.servlet.context-path=/MediCareAI

# ?? MySQL / XAMPP ?????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/medicare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ?? JPA ???????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? JWT ???????????????????????????????????????????????????????????????????
app.jwt.secret=MediCareAISuperSecretKey2026-AtLeast32Bytes
app.jwt.expiration-ms=86400000

# ?? Springdoc / Swagger ???????????????????????????????????????????????????
# Ces 3 lignes sont indispensables avec un context-path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true

# URL de dťmarrage : http://localhost:8089/MediCareAI/swagger-ui/index.html

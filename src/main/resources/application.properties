spring.application.name=medicare-ai
server.port=8089
server.servlet.context-path=/MediCareAI

# MySQL Database Configuration - Connect to server first to create DB
spring.datasource.url=jdbc:mysql://localhost:3306/medicare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=MediCareAISuperSecretKey2026-AtLeast32Bytes
app.jwt.expiration-ms=86400000

# OpenAI - Génération du PV par IA
openai.api.key=
openai.api.model=gpt-4o-mini

# Bad Words - API Ninjas (gratuit, 50 000 req/mois)
# Clé gratuite sur : https://api-ninjas.com → Sign Up → My Account → API Key
# Si vide, PurgoMalum est utilisé comme fallback (liste plus limitée)
apininjas.api.key=

springdoc.swagger-ui.urlsPrimaryName=all

spring.application.name=medicare-ai
server.port=8090
server.servlet.context-path=/MediCareAI

# MySQL Database Configuration - Connect to server first to create DB
spring.datasource.url=jdbc:mysql://localhost:3306/medicare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Database Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

app.jwt.secret=MediCareAISuperSecretKey2026-AtLeast32Bytes
app.jwt.expiration-ms=86400000

springdoc.swagger-ui.urlsPrimaryName=all
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JavaMail Configuration for Email Sending
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Pregnancy Module - RapidAPI Configuration
# Note: Set these environment variables for RapidAPI integration
pregnancy.rapidapi.key=${RAPIDAPI_KEY:}
pregnancy.rapidapi.host=${RAPIDAPI_HOST:api.api-ninjas.com}
pregnancy.rapidapi.endpoint=${RAPIDAPI_ENDPOINT:https://api.api-ninjas.com/v1/pregnancy}

# AI Nutrition FastAPI endpoint
ai.nutrition.endpoint=${AI_NUTRITION_ENDPOINT:http://localhost:8000/predict}



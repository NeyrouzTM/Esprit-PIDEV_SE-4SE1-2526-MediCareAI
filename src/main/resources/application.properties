spring.application.name=medicare-ai
server.port=8089
server.servlet.context-path=/MediCareAI

# MySQL Database Configuration - Connect to server first to create DB
spring.datasource.url=jdbc:mysql://localhost:3306/medicare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=MediCareAISuperSecretKey2026-AtLeast32Bytes
app.jwt.expiration-ms=86400000

# Appointment scheduler
app.appointments.reminder.cron=0 */10 * * * *
app.appointments.reminder.window-minutes=30

# Gmail SMTP — use a Google "App password" on the sending account (not your normal login password).
# Until username/password are set, reminder email sends are skipped (see logs).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=neyrouztoumi02@gmail.com
spring.mail.password=dysehzzzbfrwpilk
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Avoid indefinite hangs when SMTP is blocked (firewall/VPN); values in milliseconds
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
app.mail.reminders-enabled=true

# JPA: ddl-auto=update alters the schema to match entities (adds nullable columns safely; does not drop columns)
# For production, prefer Flyway/Liquibase + validate

springdoc.swagger-ui.urlsPrimaryName=all

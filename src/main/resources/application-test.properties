# Test Profile Configuration
# spring.profiles.active must not be declared inside application-test.properties

# Server Configuration
server.port=8080

# Logging
logging.level.root=INFO
logging.level.tn.esprit=DEBUG

# Database Configuration (H2 for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Mail Configuration (Mock)
spring.mail.host=localhost
spring.mail.port=3025

# JWT Configuration
app.jwt.secret=test-secret-key-very-long-for-testing-purposes-only
app.jwt.expiration-ms=86400000

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=*

# Test Configurations
spring.test.mockmvc.print=true

# Kubernetes Profile Configuration for Spring Boot

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.shutdown=graceful
server.compression.enabled=true
server.compression.min-response-size=1024

# Graceful shutdown
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging
logging.level.root=WARN
logging.level.tn.esprit=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Database Configuration - Read from K8s secrets
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-service:3306/medicare_ai?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:medicare_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:10}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Redis Configuration - Read from K8s
spring.redis.host=${SPRING_REDIS_HOST:redis-service}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.timeout=60000ms
spring.redis.jedis.pool.max-active=16
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# JWT Configuration - Read from K8s
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Mail Configuration - Read from K8s
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=false

# Security Headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Error Handling - Minimal info in production
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never

# Kubernetes-aware configuration
# Pod info available as environment variables
kubernetes.pod.name=${HOSTNAME:}
kubernetes.pod.namespace=${POD_NAMESPACE:default}
kubernetes.pod.ip=${POD_IP:}

# Actuator and Monitoring (Prometheus metrics for K8s)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=medicare-ai



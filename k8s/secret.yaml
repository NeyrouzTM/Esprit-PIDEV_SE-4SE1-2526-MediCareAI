---
# Secret for sensitive configuration (passwords, tokens, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: medicare-ai-secrets
  namespace: medicare-ai
type: Opaque
stringData:
  # Database Credentials
  db-url: "jdbc:mysql://mysql-service:3306/medicare_ai?useSSL=true&serverTimezone=UTC"
  db-username: "medicare_user"
  db-password: "CHANGE_ME_IN_PRODUCTION"

  # JWT Secret (must be at least 32 characters)
  jwt-secret: "your-very-long-secret-key-min-32-chars-for-hs256-algorithm"

  # Email Configuration
  mail-host: "smtp.gmail.com"
  mail-port: "587"
  mail-username: "your-email@gmail.com"
  mail-password: "your-app-password"

  # Redis Configuration
  redis-password: "CHANGE_ME_IN_PRODUCTION"

  # Optional: Monitoring Integrations
  sentry-dsn: ""
  newrelic-key: ""

---
# Secret for Docker registry authentication (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: medicare-ai
type: kubernetes.io/dockercfg
data:
  # Base64 encoded Docker config - replace with your registry credentials
  # Generate with: cat ~/.docker/config.json | base64 -w0
  .dockercfg: eyJnaHNyLmlvIjogeyJhdXRoIjogIkJhc2U2NFNFQ1JFVFZBTFVFIEHFUVFRVFVVRFVRFRFURFRFRFURFVFRFURFURFURFV1RFUiJ9fQ==


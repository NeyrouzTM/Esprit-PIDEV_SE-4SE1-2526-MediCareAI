---
# Service for Medicare AI Backend API
apiVersion: v1
kind: Service
metadata:
  name: medicare-ai-service
  namespace: medicare-ai
  labels:
    app: medicare-ai
  annotations:
    description: "Medicare AI Backend API Service"
spec:
  type: NodePort
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
      nodePort: 30080
  selector:
    app: medicare-ai

---
# Medicare AI Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicare-ai
  namespace: medicare-ai
  labels:
    app: medicare-ai
    version: v1
spec:
  replicas: 1
  progressDeadlineSeconds: 1200
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: medicare-ai
  template:
    metadata:
      labels:
        app: medicare-ai
        version: v1
    spec:
      serviceAccountName: medicare-ai
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity: {}
      containers:
        - name: medicare-ai
          image: brahemahmed/medicare-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Spring profiles
            - name: SPRING_PROFILES_ACTIVE
              value: "prod,k8s"

            # Database Configuration
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: db-password
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "10"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "5"

            # Redis Configuration
            - name: SPRING_REDIS_HOST
              value: redis-service
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: redis-password

            # JWT Configuration
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: jwt-secret
            - name: APP_JWT_EXPIRATION
              value: "86400000"

            # Mail Configuration
            - name: SPRING_MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: mail-host
            - name: SPRING_MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: mail-port
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: mail-username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medicare-ai-secrets
                  key: mail-password

            # JVM Configuration — optimized for single node
            - name: JAVA_OPTS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+HeapDumpOnOutOfMemoryError -Xmx768m"

            # Kubernetes-specific configuration
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # Startup probe — app uses server.servlet.context-path=/api in k8s profile
          startupProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 40

          # Liveness probe — only runs after startup probe passes
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          # Readiness probe — controls when traffic is sent
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
            - name: logs
              mountPath: /app/logs

      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql-service 3306; do echo waiting for mysql; sleep 2; done']

        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: logs
          emptyDir: {}

      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
# HorizontalPodAutoscaler — disabled for single node (minReplicas: 1)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medicare-ai-hpa
  namespace: medicare-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medicare-ai
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# PodDisruptionBudget — fixed for single node
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: medicare-ai-pdb
  namespace: medicare-ai
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: medicare-ai

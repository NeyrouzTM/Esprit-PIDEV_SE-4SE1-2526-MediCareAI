---
# Ingress for routing HTTP/HTTPS traffic
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medicare-ai-ingress
  namespace: medicare-ai
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - medicare-ai.example.com
        - api.medicare-ai.example.com
      secretName: medicare-ai-tls
  rules:
    - host: medicare-ai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medicare-ai-service
                port:
                  number: 80
    - host: api.medicare-ai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medicare-ai-service
                port:
                  number: 80

---
# NetworkPolicy for network security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medicare-ai-network-policy
  namespace: medicare-ai
spec:
  podSelector:
    matchLabels:
      app: medicare-ai
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app: medicare-ai
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

---
# ServiceAccount for Medicare AI pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: medicare-ai
  namespace: medicare-ai

---
# ClusterRole for Medicare AI
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: medicare-ai-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]

---
# ClusterRoleBinding for Medicare AI
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: medicare-ai-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medicare-ai-role
subjects:
  - kind: ServiceAccount
    name: medicare-ai
    namespace: medicare-ai

